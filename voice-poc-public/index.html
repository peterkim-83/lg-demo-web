<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meeting AI — Voice Session</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />

    <!-- 외부 CSS 연결 -->
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div class="ambient" aria-hidden="true"></div>

    <main class="card" role="main">
        <section class="visualizer-wrap" aria-label="음성 상태">
            <div class="mic-ring" id="micRing">
                <div class="mic-ring-inner" id="micInner">
                    <svg class="mic-icon" id="micIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="9" y="2" width="6" height="12" rx="3" />
                        <path d="M5 10a7 7 0 0 0 14 0" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                        <line x1="8" y1="22" x2="16" y2="22" />
                    </svg>
                </div>
            </div>

            <div class="waveform" id="waveform" aria-hidden="true">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="title-block">
                <h1 class="page-title">Voice Session</h1>
                <p class="page-subtitle">Salesforce 알림에서 전달된 세션으로 음성 브리핑을 시작합니다.</p>
            </div>
        </section>

        <div class="info-row" role="group" aria-label="세션 정보">
            <div class="info-chip info-chip--subject">
                <span class="info-chip-label">SUBJECT</span>
                <span class="info-chip-value" id="tokenValue">Checking...</span>
            </div>

            <div class="info-chip info-chip--status">
                <span class="info-chip-label">STATUS</span>
                <span class="info-chip-value status-dot ready" id="statusDot" role="status">
                    <span class="status-text">Ready</span>
                </span>
            </div>
        </div>

        <div class="timer" id="timer" aria-live="polite" aria-label="통화 시간">00:00</div>

        <div class="btn-group">
            <button class="btn-start" id="btnStart" aria-label="통화 시작">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path
                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.15 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.06 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16l.92.92z" />
                </svg>
                통화 시작
            </button>

            <button class="btn-end" id="btnEnd" disabled aria-label="통화 종료">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path
                        d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.79 19.79 0 0 1 5 13a2 2 0 0 1 1.72-2 12.05 12.05 0 0 0 .7-2.81 2 2 0 0 1-.45-2.11" />
                    <line x1="2" y1="2" x2="22" y2="22" />
                </svg>
                통화 종료
            </button>
        </div>
    </main>

    <!-- 외부 JS 연결 -->
    <script src="/app.js"></script>
</body>

</html>
