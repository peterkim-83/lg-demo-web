<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Meeting AI</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="ambient"></div>

    <div class="card">

        <!-- HEADER: badge only (서비스명 중복 제거) -->
        <div class="header">
            <span class="badge">Meeting AI</span>
        </div>

        <!-- VISUALIZER -->
        <div class="visualizer-wrap">
            <div class="mic-ring">
                <div class="mic-ring-inner" id="micInner">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                    </svg>
                </div>
            </div>

            <!-- Waveform -->
            <div class="waveform" id="waveform" aria-hidden="true">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <!-- TITLE BLOCK -->
        <div class="title-block">
            <h1 class="page-title">Voice Session</h1>
            <p class="page-subtitle">Salesforce 알림에서 전달된 세션으로 음성 브리핑을 시작합니다.</p>
        </div>

        <!-- INFO ROW: 가로 2칸 나란히 배치 -->
        <div class="info-row">
            <div class="info-chip info-chip--subject">
                <span class="info-chip-label">Session Token</span>
                <span class="info-chip-value" id="tokenValue">Checking...</span>
            </div>
            <div class="info-chip info-chip--status">
                <span class="info-chip-label">Status</span>
                <span class="info-chip-value status-dot ready" id="statusDot">Ready</span>
            </div>
        </div>

        <!-- TIMER -->
        <div class="timer" id="timer" aria-live="polite">00:00</div>

        <!-- BUTTONS -->
        <div class="btn-group">
            <button class="btn-start" id="btnStart" aria-label="통화 시작">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                   19.79-19.79 0 0 1-8.63-3.07
                   19.5 19.5 0 0 1-6-6
                   19.79 19.79 0 0 1-3.07-8.67
                   A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                   12.84 12.84 0 0 0 .7 2.81
                   2 2 0 0 1-.45 2.11L8.09 9.91
                   a16 16 0 0 0 6 6l1.27-1.27
                   a2 2 0 0 1 2.11-.45
                   12.84 12.84 0 0 0 2.81.7
                   A2 2 0 0 1 22 16.92z" />
                </svg>
                통화 시작
            </button>
            <button class="btn-end" id="btnEnd" disabled aria-label="통화 종료">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27
                   a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7
                   A2 2 0 0 1 22 16.92v3a2 2 0 0 1-2.18 2
                   19.79 19.79 0 0 1-8.63-3.07
                   19.5 19.5 0 0 1-6-6
                   19.79 19.79 0 0 1-3.07-8.67
                   A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72
                   12.84 12.84 0 0 0 .7 2.81
                   2 2 0 0 1-.45 2.11L8.09 9.91" />
                    <line x1="23" y1="1" x2="1" y2="23" />
                </svg>
                통화 종료
            </button>
        </div>

    </div><!-- /.card -->

    <script src="app.js"></script>
</body>

</html>
