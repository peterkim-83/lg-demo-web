name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Write Firebase service account
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'JSON'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PETER_DEMO_3A387 }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@15.22.3 deploy \
            --only hosting:peter-demo-web \
            --project peter-demo-3a387 \
            --json 2>&1 | tee "$RUNNER_TEMP/firebase-deploy.log"
          code=${PIPESTATUS[0]}
          set -e

          if [ "$code" -eq 0 ]; then
            echo "Firebase Hosting deploy completed."
            exit 0
          fi

          if grep -F "is the current active version" "$RUNNER_TEMP/firebase-deploy.log" >/dev/null; then
            echo "::warning::Firebase Hosting deploy reached an idempotent current-active-version release state. Treating as success because the version is already live."
            exit 0
          fi

          echo "Firebase Hosting deploy failed with exit code $code."
          exit "$code"
